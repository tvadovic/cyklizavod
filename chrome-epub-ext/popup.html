<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
    }
    .header {
      background: linear-gradient(135deg, #2c3e50, #1a252f);
      color: #fff;
      padding: 16px 20px;
      text-align: center;
    }
    .header h1 { font-size: 17px; font-weight: 700; }
    .header p { font-size: 11px; color: #bdc3c7; margin-top: 3px; }
    .content { padding: 16px 20px; }
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .label {
      font-size: 10px;
      color: #7f8c8d;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .title-display {
      font-size: 14px;
      color: #2c3e50;
      font-weight: 600;
      line-height: 1.4;
      word-wrap: break-word;
    }
    .title-display.missing { color: #95a5a6; font-style: italic; }
    input.author-input {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input.author-input:focus { border-color: #3498db; }
    input.author-input::placeholder { color: #bbb; font-style: italic; }
    #coverPreview {
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      border-radius: 6px;
      background: #eee;
      display: block;
      margin: 0 auto;
    }

    .filename-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filename-row .icon { color: #7f8c8d; font-size: 14px; }
    .filename-text {
      font-size: 13px;
      color: #2c3e50;
      word-break: break-all;
      font-family: 'Consolas', 'Courier New', monospace;
    }
    .status {
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
      text-align: center;
      font-size: 13px;
      display: none;
    }
    .status.info { display: block; background: #eaf2f8; color: #2c3e50; }
    .status.success { display: block; background: #e8f8f0; color: #27ae60; font-weight: 600; }
    .status.error { display: block; background: #fdecea; color: #e74c3c; }
    .btn {
      display: block;
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #3498db, #2980b9);
      color: #fff;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(52,152,219,0.3); }
    .btn-primary:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-primary.loading { position: relative; color: transparent; }
    .btn-primary.loading::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 20px; height: 20px;
      margin: -10px 0 0 -10px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .gallery-img {
      width: 70px; height: 55px;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s, transform 0.15s;
    }
    .gallery-img:hover { transform: scale(1.08); }
    .gallery-img.selected { border-color: #3498db; box-shadow: 0 0 0 2px rgba(52,152,219,0.3); }
    .footer { padding: 8px 20px 14px; text-align: center; font-size: 10px; color: #95a5a6; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Clanok do EPUB</h1>
    <p>Preved webovy clanok do e-knihy</p>
  </div>
  <div class="content">
    <div class="card">
      <div class="label">Nazov clanku</div>
      <div class="title-display missing" id="title">Nacitavam...</div>
    </div>

    <div class="card">
      <div class="label">Autor (mozes upravit)</div>
      <input type="text" class="author-input" id="authorInput" placeholder="Neznamy autor" />
    </div>

    <div class="card" id="coverCard">
      <div class="label">Obrazok obalky</div>
      <div id="coverLoading" style="min-height:80px; display:flex; align-items:center; justify-content:center; color:#95a5a6; font-size:12px;">Nacitavam obrazok...</div>
      <img id="coverPreview" style="width:100%; max-height:140px; object-fit:contain; border-radius:6px; display:none;" alt="" />
    </div>

    <div class="card" id="galleryCard" style="display:none;">
      <div class="label">Obrazky z clanku (klikni pre vyber ako obalku)</div>
      <div id="imageGallery" style="display:flex; flex-wrap:wrap; gap:6px; margin-top:6px;"></div>
    </div>

    <div class="card">
      <div class="label">Nazov suboru</div>
      <div class="filename-row">
        <span class="icon">[EPUB]</span>
        <span class="filename-text" id="filenameDisplay">clanok.epub</span>
      </div>
    </div>

    <div class="status" id="status"></div>

    <button class="btn btn-primary" id="convertBtn" disabled>Previest do EPUB</button>
  </div>
  <div class="footer">
    Rozsirenie pre Chrome | Subor sa stiahne do zlozky na stahovanie (Downloads)
  </div>
  <script src="zip-writer.js"></script>
  <script src="epub-generator.js"></script>
  <script src="popup.js"></script>
</body>
</html>
